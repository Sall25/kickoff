<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <title>Kickoff — where projects find their people</title>
</head>

<body>
  <div id="root"></div>
  <!--before the bundle
     loads, so dark mode paints without a flash of light theme. -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('kickoff-theme');
        if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) { }
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
